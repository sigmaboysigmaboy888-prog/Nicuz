<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Nicuz AI</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg1: #03040d;
  --bg2: #060a1a;
  --bg3: #080d20;
  --glass: rgba(6,10,26,0.82);
  --glass2: rgba(10,16,38,0.7);
  --line: rgba(43,75,255,0.22);
  --line2: rgba(59,130,246,0.18);
  --text: #dce8ff;
  --muted: #7a93c8;
  --blue: #3b82f6;
  --neon: #4f8eff;
  --neon2: #00c8ff;
  --neon3: #0ea5e9;
  --accent: #1d4ed8;
  --glow: rgba(59,130,246,0.35);
  --fs-base: 14.5px;
  --fs-msg: clamp(14px,1.3vw,15.5px);
  --pad-msg: 14px 18px;
  --radius: 20px;
  --radius-sm: 12px;
}

html { height:100%; }

body {
  background: var(--bg1);
  font-family: 'SF Pro Display', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
  overflow: hidden;
  position: relative;
}

/* ── BACKGROUND AMBIENT ── */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(29,78,216,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%, rgba(14,165,233,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(6,10,26,0.9) 0%, #03040d 100%);
  pointer-events:none;
  z-index:0;
}

/* ── GRID OVERLAY ── */
body::after {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(43,75,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(43,75,255,0.04) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events:none;
  z-index:0;
}

/* ══════════════════════════════════════════
   WELCOME SCREEN
══════════════════════════════════════════ */
#welcome {
  position:fixed; inset:0; z-index:9999;
  background: #03040d;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  overflow:hidden;
}

.wc-bg {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse 70% 60% at 30% 30%, rgba(29,78,216,0.15), transparent),
    radial-gradient(ellipse 50% 50% at 70% 70%, rgba(14,165,233,0.08), transparent);
}

.wc-inner {
  position:relative; z-index:3;
  display:flex; flex-direction:column; align-items:center; gap:24px;
}

.wc-hex {
  position:relative; width:90px; height:90px;
}
.wc-hex svg { width:100%; height:100%; filter: drop-shadow(0 0 18px #3b82f6aa); }
.wc-orbit {
  position:absolute; inset:-14px;
  border-radius:50%;
  border: 1px solid rgba(43,75,255,0.3);
  animation: orbitSpin 5s linear infinite;
}
.wc-orbit::after {
  content:'';
  position:absolute; top:-4px; left:50%;
  transform:translateX(-50%);
  width:7px; height:7px;
  background: var(--neon2);
  border-radius:50%;
  box-shadow: 0 0 12px var(--neon2);
}
.wc-orbit2 {
  position:absolute; inset:-26px;
  border-radius:50%;
  border: 1px dashed rgba(43,75,255,0.15);
  animation: orbitSpin 12s linear infinite reverse;
}
@keyframes orbitSpin { to { transform:rotate(360deg); } }

.wc-wordmark {
  font-size: clamp(28px,6vw,42px);
  font-weight:900; letter-spacing:6px;
  background: linear-gradient(135deg, #60a5fa, #93c5fd, #bfdbfe);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.wc-sub {
  font-size:11px; letter-spacing:3.5px; color:var(--muted);
  text-transform:uppercase; opacity:0;
  animation: fadeUp 0.5s ease 0.3s forwards;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.wc-status {
  width:min(300px,82vw); display:flex; flex-direction:column; gap:6px;
  opacity:0; animation: fadeUp 0.5s ease 0.55s forwards;
}
.wc-status-line {
  font-size:11.5px; color:#5a73a2; letter-spacing:0.3px;
  display:flex; justify-content:space-between; opacity:0;
  transition: opacity 0.3s;
}
.wc-status-line .ok { color:#4ade80; }
.wc-bar-wrap {
  width:min(300px,82vw); height:2px;
  background:rgba(59,130,246,0.12); border-radius:99px; overflow:hidden;
  margin-top:8px; opacity:0; animation: fadeUp 0.5s ease 0.65s forwards;
}
.wc-bar {
  height:100%; width:0%;
  background: linear-gradient(90deg, #1d4ed8, #60a5fa, #00c8ff);
  border-radius:99px; transition: width 0.1s linear;
}
#welcome.exit { animation: wExit 0.55s ease forwards; }
@keyframes wExit { to { opacity:0; transform:scale(0.97); pointer-events:none; } }

/* ══════════════════════════════════════════
   MAIN LAYOUT
══════════════════════════════════════════ */
.app {
  position:relative; z-index:1;
  width:100%; max-width:1600px;
  height:93vh;
  display:flex; gap:0;
  border-radius:28px;
  overflow:hidden;
  border: 1px solid rgba(43,75,255,0.2);
  box-shadow:
    0 0 0 1px rgba(59,130,246,0.08),
    0 30px 80px rgba(0,0,0,0.7),
    inset 0 1px 0 rgba(96,165,250,0.08);
  opacity:0; transform:translateY(18px);
  transition: opacity 0.55s ease, transform 0.55s ease;
}
.app.visible { opacity:1; transform:translateY(0); }

/* ── SIDEBAR ── */
.sidebar {
  width:280px; flex-shrink:0;
  background: rgba(4,7,18,0.95);
  border-right: 1px solid rgba(43,75,255,0.18);
  display:flex; flex-direction:column;
  overflow:hidden;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  position:relative;
}

.sidebar-header {
  padding:20px 18px 14px;
  border-bottom: 1px solid rgba(43,75,255,0.15);
  display:flex; align-items:center; gap:12px;
}

.sidebar-logo {
  display:flex; align-items:center; gap:10px;
}
.sidebar-logo svg { width:32px; height:32px; filter: drop-shadow(0 0 6px #3b82f6); }
.sidebar-logo-text {
  font-size:18px; font-weight:900; letter-spacing:2px;
  background: linear-gradient(135deg, #60a5fa, #93c5fd);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}

.sidebar-sub {
  font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase;
  padding:0 18px 14px;
  border-bottom: 1px solid rgba(43,75,255,0.15);
}

.new-chat-btn {
  margin:14px 14px 8px;
  padding:10px 14px;
  border-radius:12px;
  background: linear-gradient(135deg, rgba(29,78,216,0.5), rgba(37,99,235,0.35));
  border: 1px solid rgba(59,130,246,0.35);
  color:#93c5fd; font-size:13px; font-weight:600;
  cursor:pointer; display:flex; align-items:center; gap:8px;
  transition: background 0.2s, box-shadow 0.2s;
}
.new-chat-btn:hover {
  background: linear-gradient(135deg, rgba(29,78,216,0.7), rgba(37,99,235,0.55));
  box-shadow: 0 0 16px rgba(59,130,246,0.2);
}
.new-chat-btn svg { width:14px; height:14px; }

.sidebar-section-label {
  padding:8px 18px 4px;
  font-size:10px; letter-spacing:2px; color:#3d5299; text-transform:uppercase;
  font-weight:700;
}

.history-list {
  flex:1; overflow-y:auto; padding:6px 10px 10px;
  scrollbar-width:thin; scrollbar-color: rgba(43,75,255,0.3) transparent;
}
.history-list::-webkit-scrollbar { width:3px; }
.history-list::-webkit-scrollbar-thumb { background:rgba(43,75,255,0.3); border-radius:99px; }

.history-item {
  padding:9px 12px;
  border-radius:10px;
  cursor:pointer;
  display:flex; align-items:center; gap:9px;
  color:#8aa3d8; font-size:12.5px;
  transition: background 0.2s, color 0.2s;
  position:relative; group:true;
}
.history-item:hover { background:rgba(59,130,246,0.1); color:#c7d9f9; }
.history-item.active-hist {
  background: rgba(29,78,216,0.2);
  color:#bdd4ff;
  border:1px solid rgba(59,130,246,0.25);
}
.history-item svg { width:13px; height:13px; flex-shrink:0; opacity:0.7; }
.history-item-text { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.history-del {
  opacity:0; width:20px; height:20px; display:flex; align-items:center; justify-content:center;
  border-radius:6px; flex-shrink:0;
  color:#ef4444; transition: opacity 0.2s, background 0.2s;
  cursor:pointer;
}
.history-item:hover .history-del { opacity:1; }
.history-del:hover { background:rgba(239,68,68,0.15); }
.history-del svg { width:12px; height:12px; }

.history-empty {
  text-align:center; padding:24px 16px;
  color:#3d5299; font-size:12px; line-height:1.6;
}
.history-empty svg { width:28px; height:28px; margin:0 auto 10px; display:block; opacity:0.4; }

.sidebar-footer {
  padding:14px 18px;
  border-top: 1px solid rgba(43,75,255,0.15);
  font-size:11px; color:#3a4f7a;
  display:flex; align-items:center; gap:8px;
}
.sidebar-footer .dot-live { width:5px; height:5px; background:#22c55e; border-radius:50%; box-shadow:0 0 6px #22c55e; animation: pulse 2s ease infinite; }

/* ── MAIN PANEL ── */
.main {
  flex:1; display:flex; flex-direction:column; overflow:hidden;
  background: var(--glass);
  backdrop-filter: blur(28px);
  position:relative;
}

/* ── TOP BAR ── */
.topbar {
  padding:14px 20px;
  border-bottom: 1px solid rgba(43,75,255,0.18);
  background: rgba(4,7,18,0.6);
  display:flex; align-items:center; justify-content:space-between;
  gap:12px; flex-wrap:wrap;
  backdrop-filter:blur(10px);
}

.topbar-left { display:flex; align-items:center; gap:14px; }

.hist-toggle-btn {
  width:34px; height:34px; border-radius:10px;
  border: 1px solid rgba(43,75,255,0.3);
  background: rgba(15,22,46,0.6);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--muted);
  transition: background 0.2s, color 0.2s;
}
.hist-toggle-btn:hover { background:rgba(59,130,246,0.15); color:#93c5fd; }
.hist-toggle-btn svg { width:16px; height:16px; }

.topbar-brand { display:flex; align-items:center; gap:10px; }
.topbar-name {
  font-size:clamp(14px,2vw,18px); font-weight:800; letter-spacing:1.5px;
  background: linear-gradient(135deg, #60a5fa, #93c5fd);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.topbar-badge {
  font-size:9.5px; letter-spacing:2px; color:#3b5fa0;
  border: 1px solid rgba(43,75,255,0.3);
  padding:3px 8px; border-radius:20px;
  background:rgba(10,18,40,0.6); text-transform:uppercase;
}

.topbar-right { display:flex; align-items:center; gap:10px; }
.status-pill {
  display:flex; align-items:center; gap:7px;
  font-size:11px; color:#22c55e; letter-spacing:1px;
  padding:5px 12px; border-radius:20px;
  background:rgba(34,197,94,0.08);
  border:1px solid rgba(34,197,94,0.2);
}
.dot { width:6px; height:6px; background:#22c55e; border-radius:50%; box-shadow:0 0 8px #22c55e; animation:pulse 2s ease infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 5px #22c55e} 50%{box-shadow:0 0 14px #22c55e} }

/* ── CHAT BOX ── */
.box {
  flex:1; overflow-y:auto; padding:clamp(16px,2vw,28px);
  display:flex; flex-direction:column; gap:18px;
  scrollbar-width:thin; scrollbar-color: rgba(43,75,255,0.25) transparent;
}
.box::-webkit-scrollbar { width:4px; }
.box::-webkit-scrollbar-thumb { background:rgba(43,75,255,0.25); border-radius:99px; }

/* ── WELCOME CARD ── */
.welcome-card {
  max-width:760px; width:100%;
  align-self:flex-start;
  animation: pop 0.4s ease;
}

.wcard-title {
  font-size:clamp(18px,2.5vw,28px); font-weight:900;
  letter-spacing:0.5px; color:#c5daff;
  margin-bottom:8px;
}
.wcard-title span {
  background: linear-gradient(135deg, #60a5fa, #00c8ff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}

.wcard-sub {
  font-size:clamp(13px,1.2vw,15px); color:var(--muted);
  margin-bottom:24px; line-height:1.6;
}

/* ── NICUZ LOGO CARD ── */
.nicuz-logo-card {
  display:flex; align-items:center; gap:14px;
  margin-bottom:22px;
  padding:14px 18px;
  border-radius:16px;
  background: rgba(8,14,34,0.7);
  border: 1px solid rgba(43,75,255,0.2);
}
.nicuz-logo-card svg.big-logo { width:48px; height:48px; filter: drop-shadow(0 0 10px #3b82f6); }
.nicuz-logo-info {}
.nicuz-logo-info .n-name { font-size:22px; font-weight:900; letter-spacing:3px; background:linear-gradient(135deg,#60a5fa,#93c5fd); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.nicuz-logo-info .n-desc { font-size:11px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; }

/* ── SKILLS SECTION ── */
.skills-label {
  font-size:11px; letter-spacing:2.5px; color:#3d5299;
  text-transform:uppercase; font-weight:700;
  margin-bottom:14px;
}

.skills-section {
  display:flex; flex-direction:column; gap:10px; margin-bottom:14px;
}

.skills-row { display:flex; gap:10px; }
.skill-card {
  flex:1;
  padding:16px 18px;
  border-radius:16px;
  background: rgba(6,12,30,0.8);
  border: 1px solid rgba(43,75,255,0.2);
  cursor:pointer;
  transition: border-color 0.3s, background 0.3s, box-shadow 0.3s, transform 0.2s;
  position:relative; overflow:hidden;
}
.skill-card::before {
  content:'';
  position:absolute; inset:0;
  background: linear-gradient(135deg, rgba(29,78,216,0.08), transparent);
  opacity:0; transition:opacity 0.3s;
}
.skill-card:hover::before { opacity:1; }
.skill-card:hover {
  border-color:rgba(59,130,246,0.45);
  box-shadow: 0 0 20px rgba(59,130,246,0.12), inset 0 0 20px rgba(29,78,216,0.05);
  transform:translateY(-2px);
}

.skill-card-center {
  text-align:center;
  max-width:280px; align-self:center;
}

.skill-icon {
  width:38px; height:38px; border-radius:11px;
  background: linear-gradient(135deg, rgba(29,78,216,0.3), rgba(37,99,235,0.2));
  border: 1px solid rgba(59,130,246,0.3);
  display:flex; align-items:center; justify-content:center;
  margin-bottom:10px;
  box-shadow: 0 0 16px rgba(59,130,246,0.15);
}
.skill-card-center .skill-icon { margin:0 auto 10px; }
.skill-icon svg { width:18px; height:18px; }

.skill-name {
  font-size:13.5px; font-weight:700; color:#93c5fd;
  margin-bottom:3px; letter-spacing:0.3px;
}
.skill-headline {
  font-size:12px; font-weight:600; color:#60a5fa;
  margin-bottom:4px; letter-spacing:0.5px;
}
.skill-desc { font-size:11.5px; color:#556b99; line-height:1.5; }

/* ── MESSAGES ── */
.turn { display:flex; flex-direction:column; max-width:min(860px,90%); }
.turn.user-turn { align-self:flex-end; align-items:flex-end; }
.turn.bot-turn { align-self:flex-start; align-items:flex-start; width:100%; }

.msg {
  padding:var(--pad-msg); border-radius:var(--radius);
  line-height:1.68; font-size:var(--fs-msg);
  animation: pop 0.25s ease; word-wrap:break-word;
  width:fit-content; max-width:100%;
}

.user {
  background: linear-gradient(135deg, #1e3a8a, #1d4ed8);
  color:white;
  box-shadow: 0 4px 20px rgba(29,78,216,0.3);
}

.bot {
  background: rgba(8,14,34,0.85);
  border: 1px solid rgba(43,75,255,0.22);
  color:var(--text); width:100%;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

.bot p { margin:0 0 10px; }
.bot p:last-child { margin-bottom:0; }

/* live cursor */
.type-cursor {
  display:inline-block; width:2px; height:16px;
  background: linear-gradient(180deg, #60a5fa, #00c8ff);
  margin-left:2px; vertical-align:-3px;
  border-radius:1px;
  animation: blink 0.85s steps(1) infinite;
  box-shadow: 0 0 6px #60a5fa;
}
@keyframes blink { 50%{opacity:0;} }

/* ── LIVE CODE BLOCK (streaming) ── */
.live-code-block {
  background:#030610;
  border-radius:14px;
  overflow:hidden;
  border: 1px solid rgba(29,78,216,0.4);
  margin:10px 0;
  box-shadow: 0 0 24px rgba(29,78,216,0.1);
  animation: pop 0.25s ease;
}
.live-code-head {
  display:flex; justify-content:space-between; align-items:center;
  padding:9px 14px;
  background: linear-gradient(90deg, rgba(29,78,216,0.2), rgba(37,99,235,0.1));
  border-bottom: 1px solid rgba(29,78,216,0.3);
  font-size:11.5px; color:#93c5fd; letter-spacing:0.5px;
}
.live-code-head .lc-name { display:flex; align-items:center; gap:8px; font-weight:700; }
.live-code-head .lc-name svg { width:12px; height:12px; }
.live-code-streaming { font-size:11px; color:#4ade80; display:flex; align-items:center; gap:5px; }
.live-code-streaming .sc-dot { width:5px; height:5px; background:#4ade80; border-radius:50%; box-shadow:0 0 6px #4ade80; animation:pulse2 1s ease infinite; }
@keyframes pulse2 { 0%,100%{opacity:1} 50%{opacity:0.3} }
pre.live-code-pre {
  margin:0; padding:14px 14px 12px;
  overflow-x:auto; font-size:12.5px; line-height:1.6;
  color:#c8ddff;
  font-family: 'SF Mono','Fira Code','Courier New',monospace;
  min-height:20px;
  max-height:none;
}

/* ── STATIC CODE BLOCK ── */
.code-block {
  background:#030610;
  border-radius:14px; overflow:hidden;
  border: 1px solid rgba(29,78,216,0.3);
  margin:10px 0;
  box-shadow: 0 0 24px rgba(29,78,216,0.08);
}
.code-head {
  display:flex; justify-content:space-between; align-items:center;
  padding:9px 14px;
  background: linear-gradient(90deg, rgba(29,78,216,0.18), rgba(37,99,235,0.08));
  border-bottom: 1px solid rgba(29,78,216,0.25);
  font-size:11.5px; color:#93c5fd; letter-spacing:0.3px;
}
.code-head .fname { display:flex; align-items:center; gap:8px; font-weight:700; }
.code-head .fname svg { width:12px; height:12px; opacity:0.8; }
.code-actions { display:flex; gap:6px; }
.code-btn {
  display:flex; align-items:center; gap:5px;
  font-size:11px; color:#93c5fd;
  background:rgba(59,130,246,0.1);
  border: 1px solid rgba(59,130,246,0.3);
  padding:4px 10px; border-radius:8px;
  cursor:pointer; transition: background 0.2s, color 0.2s;
}
.code-btn:hover { background:rgba(59,130,246,0.25); color:#fff; }
.code-btn.copied { color:#4ade80; border-color:rgba(74,222,128,0.4); }
.code-btn svg { width:11px; height:11px; }
pre.code-pre {
  margin:0; padding:14px;
  overflow-x:auto; font-size:12.5px; line-height:1.6;
  color:#c8ddff;
  font-family: 'SF Mono','Fira Code','Courier New',monospace;
}

/* preview */
.preview-wrap { border-top: 1px solid rgba(29,78,216,0.25); background:#fff; }
.preview-wrap iframe { width:100%; height:380px; border:none; display:block; }
.preview-bar {
  display:flex; justify-content:space-between; align-items:center;
  padding:7px 14px;
  background:rgba(29,78,216,0.15); font-size:10.5px; color:#93c5fd;
}
.preview-bar .close-prev { cursor:pointer; }

/* ── THINKING ── */
.thinking {
  padding:16px 18px;
  border-left: 2px solid #3b82f6;
  background: rgba(6,12,30,0.8);
  border-radius:16px; width:100%;
  box-shadow: 0 0 20px rgba(29,78,216,0.07);
}
.thinking-title {
  font-size:10.5px; color:#60a5fa; margin-bottom:12px;
  letter-spacing:2px; display:flex; align-items:center; gap:8px;
  text-transform:uppercase; font-weight:700;
}
.thinking-title svg { width:12px; height:12px; animation:spin 1.3s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

.step {
  font-size:12px; color:var(--muted);
  padding:5px 0; opacity:0.3; transition:0.35s;
  display:flex; align-items:center; gap:10px;
}
.step-indicator {
  width:16px; height:16px; border-radius:50%; flex-shrink:0;
  border: 1px solid currentColor; display:flex; align-items:center; justify-content:center;
  font-size:8px; transition:0.35s;
}
.step.active { opacity:1; color:#9ecbff; }
.step.active .step-indicator { background:rgba(59,130,246,0.2); border-color:#60a5fa; }
.step.done { opacity:0.7; color:#4ade80; }
.step.done .step-indicator { background:rgba(74,222,128,0.15); border-color:#4ade80; color:#4ade80; }

/* erase */
.erasing { animation: eraseOut 0.42s cubic-bezier(0.6,0,0.8,0.2) forwards; }
@keyframes eraseOut {
  0%{opacity:1;transform:scale(1) translateY(0);max-height:600px;}
  60%{opacity:0.3;transform:scale(0.97) translateY(4px);}
  100%{opacity:0;transform:scale(0.9) translateY(10px);max-height:0;margin:0;padding-top:0;padding-bottom:0;}
}

/* resp actions */
.resp-actions { display:flex; gap:8px; margin-top:8px; padding-left:2px; }
.resp-btn {
  display:flex; align-items:center; justify-content:center;
  width:30px; height:30px; border-radius:50%;
  background:rgba(59,130,246,0.08);
  border:1px solid rgba(59,130,246,0.25);
  cursor:pointer; color:var(--muted);
  transition: background 0.2s, color 0.2s, transform 0.15s;
}
.resp-btn:hover { background:rgba(59,130,246,0.2); color:#c7d9ff; }
.resp-btn:active { transform:scale(0.92); }
.resp-btn svg { width:14px; height:14px; }
.resp-btn.copy-ok { color:#4ade80; border-color:rgba(74,222,128,0.4); }
.resp-btn.spin svg { animation:spin 0.6s linear; }

.model-row { display:flex; gap:8px; flex-wrap:wrap; }
.model-pill {
  display:flex; align-items:center; gap:8px;
  padding:8px 14px; border-radius:999px;
  border:1px solid rgba(43,75,255,0.25);
  background:rgba(10,16,38,0.7); color:var(--muted);

.model-pill .m-dot { width:6px; height:6px; border-radius:50%; background:#374d7a; flex-shrink:0; }
.model-pill.active {
  color:#c5daff; border-color:rgba(59,130,246,0.6);
  background: linear-gradient(135deg, rgba(29,78,216,0.35), rgba(37,99,235,0.2));

.model-pill.active .m-dot { background:#60a5fa; box-shadow:0 0 8px #3b82f6; }
.model-pill.mariana.active .m-dot { background:var(--neon2); box-shadow:0 0 8px var(--neon2); }

/* ── INPUT AREA ── */
.input-area {
  border-top: 1px solid rgba(43,75,255,0.18);
  background: rgba(4,7,18,0.8);
  padding:14px 16px; display:flex; flex-direction:column; gap:10px;
  backdrop-filter:blur(10px);

.input-wrap { flex:1; position:relative; display:flex; align-items:center; }
.input-icon { position:absolute; left:16px; opacity:0.35; pointer-events:none; }
.input-icon svg { width:15px; height:15px; }

input[type="text"] {

input[type="text"]::placeholder { color:rgba(122,147,200,0.45); }

button#sendBtn {

function escapeHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function formatText(t){
  return escapeHtml(t)
    .replace(/\*\*(.*?)\*\*/g,"<b>$1</b>")
    .replace(/\*(.*?)\*/g,"<i>$1</i>")
    .replace(/`([^`]+)`/g,'<code style="background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.25);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:0.9em">$1</code>')
    .split(/\n{2,}/).map(p=>`<p>${p.replace(/\n/g,"<br>")}</p>`).join("");
}

/* parse ``` blocks */
function parseSegments(raw){
  const segs=[];
  const re=/```([^\n`]*)\n([\s\S]*?)```/g;
  let last=0,m;
  while((m=re.exec(raw))!==null){
    if(m.index>last) segs.push({type:"text",content:raw.slice(last,m.index)});
    segs.push({type:"code",label:m[1].trim(),code:m[2]});
    last=re.lastIndex;
  }
  if(last<raw.length) segs.push({type:"text",content:raw.slice(last)});
  return segs;
}

function stripUnclosedFence(s){
  const c=(s.match(/```/g)||[]).length;
  if(c%2===1){const i=s.lastIndexOf("```");return s.slice(0,i);}

}

/* ─── LIVE TYPING WITH CODE STREAMING ─── */
async function typeOutResponse(container, rawText) {
  const cursor = document.createElement("span");
  cursor.className = "type-cursor";

  // We'll build the response progressively
  // Track state: are we currently inside a code fence?
  let revealedSoFar = "";
  let liveTextDiv = document.createElement("div");
  container.appendChild(liveTextDiv);
  container.appendChild(cursor);

  // Live code block state
  let currentLiveCodeBlock = null;
  let currentLivePre = null;
  let insideCodeFence = false;
  let currentCodeLabel = "";
  let currentCodeContent = "";
  let fenceStartIdx = -1;

  const CHUNK = 3;
  const DELAY_TEXT = 9;
  const DELAY_CODE = 5;

  for (let i = 0; i < rawText.length; i += CHUNK) {
    revealedSoFar = rawText.slice(0, i + CHUNK);

    // Check if we just opened a code fence
    if (!insideCodeFence) {
      // Look for ``` in recently added text
      const fenceMatch = revealedSoFar.match(/```([^\n`]*)\n/g);
      const lastFenceOpen = revealedSoFar.lastIndexOf("```");

      // Count fences so far
      const fenceCount = (revealedSoFar.match(/```/g) || []).length;

      if (fenceCount % 2 === 1) {
        // We just entered a code block
        insideCodeFence = true;
        fenceStartIdx = revealedSoFar.lastIndexOf("```");

        // Get label
        const afterFence = revealedSoFar.slice(fenceStartIdx + 3);
        const newlineIdx = afterFence.indexOf("\n");
        currentCodeLabel = newlineIdx !== -1 ? afterFence.slice(0, newlineIdx).trim() : afterFence.trim();
        currentCodeContent = newlineIdx !== -1 ? afterFence.slice(newlineIdx + 1) : "";

        // Render text before the fence
        const textBefore = revealedSoFar.slice(0, fenceStartIdx);
        liveTextDiv.innerHTML = formatText(stripUnclosedFence(textBefore));

        // Create live code block
        currentLiveCodeBlock = document.createElement("div");
        currentLiveCodeBlock.className = "live-code-block";
        const displayName = currentCodeLabel || "code";
        currentLiveCodeBlock.innerHTML = `
          <div class="live-code-head">
            <div class="lc-name">${ICON_FILE}<span>${escapeHtml(displayName)}</span></div>
            <div class="live-code-streaming"><div class="sc-dot"></div>generating...</div>
          </div>
          <pre class="live-code-pre"></pre>
        `;
        currentLivePre = currentLiveCodeBlock.querySelector(".live-code-pre");
        // Insert before cursor
        container.insertBefore(currentLiveCodeBlock, cursor);

        await new Promise(r => setTimeout(r, DELAY_TEXT));
        continue;
      }

      // Normal text reveal
      liveTextDiv.innerHTML = formatText(stripUnclosedFence(revealedSoFar));
      box.scrollTop = box.scrollHeight;
      await new Promise(r => setTimeout(r, DELAY_TEXT));

    } else {
      // Inside code fence — check if we closed it
      const fenceCount = (revealedSoFar.match(/```/g) || []).length;

      if (fenceCount % 2 === 0) {
        // Fence closed
        insideCodeFence = false;

        // Get full code content
        const afterLabel = revealedSoFar.slice(fenceStartIdx + 3);
        const newlineIdx = afterLabel.indexOf("\n");
        const fullCodePart = newlineIdx !== -1 ? afterLabel.slice(newlineIdx + 1) : "";
        const closeIdx = fullCodePart.lastIndexOf("```");
        const finalCode = closeIdx !== -1 ? fullCodePart.slice(0, closeIdx) : fullCodePart;

        // Update the live pre with final code
        if (currentLivePre) {
          currentLivePre.textContent = finalCode.replace(/\n$/, "");
        }

        // Mark streaming as done — update header
        if (currentLiveCodeBlock) {
          const streamingEl = currentLiveCodeBlock.querySelector(".live-code-streaming");
          if (streamingEl) streamingEl.innerHTML = `<span style="color:#4ade80;font-size:10.5px;letter-spacing:1px;">✓ done</span>`;
        }

        // Find what's after the closed fence
        const closedFenceIdx = revealedSoFar.lastIndexOf("```");
        const afterClose = revealedSoFar.slice(closedFenceIdx + 3);

        // Reset for next text segment
        liveTextDiv = document.createElement("div");
        container.insertBefore(liveTextDiv, cursor);

        if (afterClose.trim()) {
          liveTextDiv.innerHTML = formatText(stripUnclosedFence(afterClose));
        }

        currentLiveCodeBlock = null;
        currentLivePre = null;
        currentCodeLabel = "";
        currentCodeContent = "";
        fenceStartIdx = -1;

        await new Promise(r => setTimeout(r, DELAY_TEXT));
        box.scrollTop = box.scrollHeight;
        continue;
      }

      // Still inside code — stream lines into pre
      if (currentLivePre) {
        const afterFenceStart = revealedSoFar.slice(fenceStartIdx + 3);
        const newlineIdx = afterFenceStart.indexOf("\n");
        const codeContent = newlineIdx !== -1 ? afterFenceStart.slice(newlineIdx + 1) : "";
        currentLivePre.textContent = codeContent;
      }

      box.scrollTop = box.scrollHeight;
      await new Promise(r => setTimeout(r, DELAY_CODE));
    }
  }

  // Done — remove cursor, rebuild cleanly
  cursor.remove();
  // Remove all live elements
  while (container.firstChild) container.removeChild(container.firstChild);
  renderBotContent(container, rawText);
  box.scrollTop = box.scrollHeight;
}

async function showThinking(userMsg) {
  const steps = inferThinkingSteps(userMsg);
  const wrap = document.createElement("div");
  wrap.className = "msg bot thinking";

  const title = document.createElement("div");
  title.className = "thinking-title";
  title.innerHTML = SPINNER_SVG + "<span>Nicuz sedang berpikir...</span>";
  wrap.appendChild(title);

  const stepsBox = document.createElement("div");
  wrap.appendChild(stepsBox);
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;

  const stepEls = [];
  for (let i = 0; i < steps.length; i++) {
    const s = document.createElement("div");
    s.className = "step";
    s.innerHTML = `<div class="step-indicator">
      <svg viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="3" fill="currentColor" opacity="0.5"/></svg>
    </div><span>${steps[i]}</span>`;
    stepsBox.appendChild(s);
    stepEls.push(s);
  }

  for (let i = 0; i < stepEls.length; i++) {
    // Mark previous as done
    if (i > 0) {
      stepEls[i-1].classList.remove("active");
      stepEls[i-1].classList.add("done");
      stepEls[i-1].querySelector(".step-indicator").innerHTML = `<svg viewBox="0 0 10 10" fill="none"><path d="M2.5 5L4.5 7L7.5 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`;
    }
    stepEls[i].classList.add("active");
    await new Promise(r => setTimeout(r, 420 + Math.random() * 180));
    box.scrollTop = box.scrollHeight;
  }
  // Mark last as done
  if (stepEls.length) {
    stepEls[stepEls.length-1].classList.remove("active");
    stepEls[stepEls.length-1].classList.add("done");
    stepEls[stepEls.length-1].querySelector(".step-indicator").innerHTML = `<svg viewBox="0 0 10 10" fill="none"><path d="M2.5 5L4.5 7L7.5 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`;
  }

  return wrap;
}

function buildRespActions(turnEl, contentEl, userMsg, modelUsed) {
  const row = document.createElement("div");

  const copyBtn = document.createElement("div");
  copyBtn.className = "resp-btn"; copyBtn.innerHTML = ICON_COPY; copyBtn.title = "Copy response";
  copyBtn.addEventListener("click", () => {
    navigator.clipboard.writeText(contentEl.innerText).then(() => {
      copyBtn.innerHTML = ICON_CHECK; copyBtn.classList.add("copy-ok");
      setTimeout(() => { copyBtn.innerHTML = ICON_COPY; copyBtn.classList.remove("copy-ok"); }, 1500);
    });
  });

  const regenBtn = document.createElement("div");
  regenBtn.className = "resp-btn"; regenBtn.innerHTML = ICON_REGEN; regenBtn.title = "Regenerate";
  regenBtn.addEventListener("click", async () => {
    if (regenBtn.classList.contains("spin")) return;
    regenBtn.classList.add("spin");
    if (history.length && history[history.length-1].role === "model") history.pop();
    contentEl.classList.add("erasing"); row.classList.add("erasing");
    await new Promise(r => setTimeout(r, 420));
    contentEl.remove(); row.remove();
    const thBox = await showThinking(userMsg);
    const reply = await callApi(userMsg, modelUsed, true);
    remove(thBox);
    const newContent = document.createElement("div");
    newContent.className = "msg bot";
    turnEl.insertBefore(newContent, null);
    await typeOutResponse(newContent, reply);
    const newRow = buildRespActions(turnEl, newContent, userMsg, modelUsed);
    turnEl.appendChild(newRow);
    box.scrollTop = box.scrollHeight;
  });

  row.appendChild(copyBtn);
  row.appendChild(regenBtn);
  return row;
}

/* ─── API CALL (unchanged endpoint/key/model logic) ─── */
async function callApi(userMsg, model, isRegenerate) {
  try {
    const contents = [
      {role:"user",parts:[{text:SYSTEM_PROMPT}]},
      {role:"model",parts:[{text:"Baik, saya Nicuz. Siap membantu."}]},
      ...history,
      {role:"user",parts:[{text:userMsg}]}
    ];
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`,
      {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents})}
    );
    const data = await res.json();
    const reply = data?.candidates?.[0]?.content?.parts?.map(p=>p.text).join("") || "Maaf, tidak ada respon yang diterima.";
    history.push({role:"user",parts:[{text:userMsg}]});
    history.push({role:"model",parts:[{text:reply}]});
    return reply;
  } catch(e) {
    return "Terjadi kendala koneksi. Silakan coba lagi.";
  }
}

/* ─── HISTORY MANAGEMENT ─── */
function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

function createNewSession(firstMsg) {
  const id = generateId();
  const session = {
    id,
    title: firstMsg.slice(0,48) + (firstMsg.length > 48 ? "..." : ""),
    created: Date.now(),
    messages: []
  };
  storedSessions.unshift(session);
  saveStoredSessions(storedSessions);
  return id;
}

function addMessageToSession(sessionId, role, content) {
  const session = storedSessions.find(s => s.id === sessionId);
  if (!session) return;
  session.messages.push({ role, content, ts: Date.now() });
  saveStoredSessions(storedSessions);
}

function deleteSession(sessionId) {
  storedSessions = storedSessions.filter(s => s.id !== sessionId);
  saveStoredSessions(storedSessions);
  renderHistorySidebar();
  if (currentSessionId === sessionId) {
    currentSessionId = null;
  }
}

function loadSession(sessionId) {
  const session = storedSessions.find(s => s.id === sessionId);
  if (!session) return;

  // Clear current chat
  box.innerHTML = "";
  history = [];
  currentSessionId = sessionId;

  // Rebuild in-memory history and re-render messages
  session.messages.forEach(msg => {
    history.push({ role: msg.role === "user" ? "user" : "model", parts: [{ text: msg.content }] });

    if (msg.role === "user") {
      const turn = document.createElement("div");
      turn.className = "turn user-turn";
      const m = document.createElement("div");
      m.className = "msg user"; m.textContent = msg.content;
      turn.appendChild(m); box.appendChild(turn);
    } else {
      const turn = document.createElement("div");
      turn.className = "turn bot-turn";
      const content = document.createElement("div");
      content.className = "msg bot";
      renderBotContent(content, msg.content);
      turn.appendChild(content);
      box.appendChild(turn);
    }
  });

  renderHistorySidebar();
  box.scrollTop = box.scrollHeight;
  closeSidebar();
}

function renderHistorySidebar() {
  const list = document.getElementById("historyList");
  const empty = document.getElementById("historyEmpty");
  // Clear existing items (except empty state)
  Array.from(list.querySelectorAll(".history-item")).forEach(el => el.remove());

  if (storedSessions.length === 0) {
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  storedSessions.forEach(session => {
    const item = document.createElement("div");
    item.className = "history-item" + (session.id === currentSessionId ? " active-hist" : "");
    item.innerHTML = `${ICON_CHAT}<span class="history-item-text">${escapeHtml(session.title)}</span><div class="history-del" title="Delete">${ICON_TRASH}</div>`;
    item.querySelector(".history-del").addEventListener("click", e => {
      e.stopPropagation();
      deleteSession(session.id);
    });
    item.addEventListener("click", () => loadSession(session.id));
    list.insertBefore(item, empty);
  });
}

  if (wcard) wcard.remove();

  addUserTurn(msg);
  input.value = "";
  btn.disabled = true;

  // Create or update session
  if (!currentSessionId) {
    currentSessionId = createNewSession(msg);
  }
  addMessageToSession(currentSessionId, "user", msg);

  const modelUsed = currentModel;
  const thBox = await showThinking(msg);
  const reply = await callApi(msg, modelUsed, false);
  remove(thBox);

  addMessageToSession(currentSessionId, "model", reply);
  renderHistorySidebar();

  const turn = document.createElement("div");
  turn.className = "turn bot-turn";
  const content = document.createElement("div");
  content.className = "msg bot";
  turn.appendChild(content);
  box.appendChild(turn);

  await typeOutResponse(content, reply);

  const actions = buildRespActions(turn, content, msg, modelUsed);
  turn.appendChild(actions);
  box.scrollTop = box.scrollHeight;

  btn.disabled = false;
}

btn.onclick = send;
input.addEventListener("keydown", e => { if (e.key === "Enter") send(); });
</script>
</body>
</html>
